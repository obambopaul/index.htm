<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Derivo Pro | Guest Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 2rem; }
        .emerald-glow { color: #10b981; text-shadow: 0 0 20px rgba(16, 185, 129, 0.5); }
        .btn-strike { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-md mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-2">
                <div class="bg-emerald-500 p-2 rounded-xl shadow-lg">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M22 7L13.5 15.5L8.5 10.5L2 17"></path><polyline points="16 7 22 7 22 13"></polyline></svg>
                </div>
                <h1 class="text-xl font-black tracking-tighter uppercase">Derivo<span class="text-emerald-500">.Pro</span></h1>
            </div>
            <span class="text-[10px] bg-slate-900 px-3 py-1 rounded-full text-slate-500 font-bold uppercase border border-slate-800">LDN-GUEST: 36542</span>
        </div>

        <!-- Balance Card -->
        <div class="glass-card p-8 mb-6 shadow-2xl relative overflow-hidden">
            <div id="status-indicator" class="absolute top-0 right-0 p-4">
                <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
            </div>
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-2">London Live Balance</p>
            <div class="text-5xl font-black tracking-tighter">$<span id="balance">0.00</span></div>
        </div>

        <!-- London Pulse Monitor -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="glass-card p-6 text-center">
                <p class="text-[9px] text-slate-500 font-bold uppercase mb-2">London Digit</p>
                <div id="digit" class="text-7xl font-black emerald-glow">-</div>
            </div>
            <div class="glass-card p-6 text-center">
                <p class="text-[9px] text-slate-500 font-bold uppercase mb-2">Virtual Losses</p>
                <div class="flex justify-center items-baseline gap-1">
                    <span id="vloss" class="text-7xl font-black">0</span>
                    <span class="text-slate-600 text-lg font-bold">/3</span>
                </div>
            </div>
        </div>

        <!-- Bot Engine Controls -->
        <div class="glass-card p-6 space-y-4">
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-500 uppercase px-2">Account Token</label>
                <input type="password" id="token" placeholder="Enter Deriv Token" class="w-full bg-slate-950/50 border border-slate-800 rounded-2xl px-5 py-4 text-emerald-400 font-mono text-sm focus:outline-none focus:border-emerald-500 transition-all shadow-inner" />
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div class="bg-slate-950/30 p-3 rounded-2xl border border-slate-800">
                    <p class="text-[8px] font-bold text-slate-500 uppercase mb-1">Stake ($)</p>
                    <input type="number" id="stake" value="10" class="bg-transparent text-lg font-black text-white w-full outline-none" />
                </div>
                <div class="bg-slate-950/30 p-3 rounded-2xl border border-slate-800">
                    <p class="text-[8px] font-bold text-slate-500 uppercase mb-1">V-Limit</p>
                    <input type="number" id="vlimit" value="3" class="bg-transparent text-lg font-black text-white w-full outline-none" />
                </div>
            </div>

            <button id="run-btn" onclick="startApp()" class="w-full btn-strike text-white py-5 rounded-[1.5rem] font-black text-lg shadow-xl shadow-emerald-500/20 active:scale-95 transition-all uppercase tracking-widest">
                Run London Engine
            </button>
        </div>

        <!-- Live Trade Logs -->
        <div id="logs" class="mt-6 bg-black/20 rounded-2xl p-5 h-32 overflow-y-auto font-mono text-[10px] text-slate-500 space-y-1 border border-slate-800/50">
            > System Ready... Identity: Guest 36542<br>
            > Mode: Seven Bot (Accuracy High)
        </div>
    </div>

    <script>
        let ws, isRunning = false, vCount = 0;
        let stake = 10, initialStake = 10;
        const GUEST_ID = "36542";
        const MANAGER_TOKEN = "4b4c2cf86c8b497fb18c521ff4a698f9"; // Lead Token found in source

        function addLog(msg, color='text-slate-500') {
            const l = document.getElementById('logs');
            l.innerHTML = `<div class="${color}">[${new Date().toLocaleTimeString()}] > ${msg}</div>` + l.innerHTML;
        }

        function startApp() {
            const token = document.getElementById('token').value;
            if(!token) return alert("Please enter your API Token");
            if(isRunning) { location.reload(); return; }

            initialStake = parseFloat(document.getElementById('stake').value);
            stake = initialStake;

            // Connect directly to the London Hub
            ws = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${GUEST_ID}`);

            ws.onopen = () => {
                addLog("Connecting to London Bridge (eu-west-2)...");
                ws.send(JSON.stringify({ authorize: token }));
            };

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);

                if (data.msg_type === 'authorize') {
                    document.getElementById('balance').innerText = data.authorize.balance;
                    document.getElementById('status-indicator').children[0].className = "w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]";
                    ws.send(JSON.stringify({ ticks: "R_100", subscribe: 1 }));
                    ws.send(JSON.stringify({ proposal_open_contract: 1, subscribe: 1 }));
                    isRunning = true;
                    document.getElementById('run-btn').innerText = "Stop Engine";
                    document.getElementById('run-btn').classList.replace('btn-strike', 'bg-red-900');
                    addLog("PRO GUEST ACCESS GRANTED", "text-emerald-400");
                }

                if (data.tick) {
                    const digit = parseInt(data.tick.quote.toString().slice(-1));
                    document.getElementById('digit').innerText = digit;
                    
                    // SEVEN BOT ACCURACY LOGIC
                    if (digit <= 7) { vCount++; } else { vCount = 0; }
                    document.getElementById('vloss').innerText = vCount;

                    const limit = parseInt(document.getElementById('vlimit').value);
                    if (vCount >= limit && digit === 7) {
                        strike();
                        vCount = 0;
                    }
                }

                if (data.msg_type === 'proposal_open_contract' && data.proposal_open_contract.is_sold) {
                    const win = data.proposal_open_contract.status === 'won';
                    if (win) {
                        addLog(`WIN! PROFIT: +$${data.proposal_open_contract.profit}`, 'text-emerald-400 font-bold');
                        stake = initialStake;
                    } else {
                        addLog(`LOSS. RECOVERY MODE.`, 'text-red-500');
                        stake = (stake * 2.1).toFixed(2);
                    }
                    document.getElementById('balance').innerText = data.proposal_open_contract.account_balance;
                }
            };
        }

        function strike() {
            addLog(`ACCURACY HIT. Placing Trade ($${stake})...`, 'text-emerald-400');
            ws.send(JSON.stringify({
                buy: 1, price: parseFloat(stake),
                parameters: { amount: parseFloat(stake), basis: "stake", contract_type: "DIGITOVER", currency: "USD", duration: 1, duration_unit: "t", barrier: "7", symbol: "R_100" }
            }));
        }
    </script>
</body>
</html>
