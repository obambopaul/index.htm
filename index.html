<!DOCTYPE html>
<html lang="en">

            <div class="text-5xl font-black tracking-tighter text-emerald-400">$<span id="balance">0.00</span></div>
            <div id="status" class="mt-4 inline-block text-[9px] font-black uppercase text-red-500 bg-red-500/10 px-3 py-1 rounded-full border border-red-500/20">Disconnected</div>
        </div>

        <!-- Monitor Row -->

            <div class="glass p-6 text-center border-b-4 border-emerald-500">
                <p class="text-[9px] text-slate-500 font-bold uppercase mb-2">London Pulse</p>
                <div id="digit" class="text-6xl font-black text-white">-</div>
            </div>
            <div class="glass p-6 text-center border-b-4 border-slate-700">
                <p class="text-[9px] text-slate-500 font-bold uppercase mb-2">V-Losses</p>
                <div class="flex justify-center items-baseline gap-1">
                    <span id="vloss" class="text-6xl font-black text-white">0</span>
                    <span class="text-slate-600 text-sm font-bold">/3</span>
                </div>
            </div>
        </div>

            <button type="button" onclick="setBot('flash')" id="b-flash" class="bg-slate-800 text-slate-500 text-[10px] font-black p-4 rounded-xl border border-slate-700 transition-all uppercase">Flash</button>
            <button type="button" onclick="setBot('parity')" id="b-parity" class="bg-slate-800 text-slate-500 text-[10px] font-black p-4 rounded-xl border border-slate-700 transition-all uppercase">Parity</button>
        </div>

            <div class="space-y-1">
                <label class="text-[9px] font-bold text-slate-500 uppercase ml-2">Deriv API Token</label>

            </div>
