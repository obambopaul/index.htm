<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Derivo Pro | Guest Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 2rem; }
        .emerald-glow { color: #10b981; text-shadow: 0 0 20px rgba(16, 185, 129, 0.5); }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-xl font-black uppercase">Derivo<span class="text-emerald-500">.Pro</span></h1>
            <span class="text-[10px] bg-slate-900 px-3 py-1 rounded-full text-slate-500 font-bold border border-slate-800">LDN-GUEST: 36542</span>
        </div>
        <div class="glass-card p-8 mb-6 shadow-2xl">
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-2">London Live Balance</p>
            <div class="text-5xl font-black tracking-tighter">$<span id="balance">0.00</span></div>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="glass-card p-6 text-center">
                <p class="text-[9px] text-slate-500 font-bold uppercase mb-2">London Digit</p>
                <div id="digit" class="text-7xl font-black emerald-glow">-</div>
            </div>
            <div class="glass-card p-6 text-center">
                <p class="text-[9px] text-slate-500 font-bold uppercase mb-2">V-Losses</p>
                <div id="vloss" class="text-7xl font-black">0</div>
            </div>
        </div>
        <div class="glass-card p-6 space-y-4">
            <input type="password" id="token" placeholder="Enter Deriv Token" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-5 py-4 text-emerald-400 font-mono text-sm focus:outline-none focus:border-emerald-500" />
            <button onclick="startBot()" class="w-full bg-emerald-500 text-white py-5 rounded-[1.5rem] font-black text-lg active:scale-95 transition-all">Run London Engine</button>
        </div>
    </div>
    <script>
        let ws, vCount = 0;
        function startBot() {
            const token = document.getElementById('token').value;
            if(!token) return alert("Enter Token");
            ws = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=36542`);
            ws.onopen = () => ws.send(JSON.stringify({ authorize: token }));
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.msg_type === 'authorize') {
                    document.getElementById('balance').innerText = data.authorize.balance;
                    ws.send(JSON.stringify({ ticks: "R_100", subscribe: 1 }));
                }
                if (data.tick) {
                    const d = parseInt(data.tick.quote.toString().slice(-1));
                    document.getElementById('digit').innerText = d;
                    if (d <= 7) vCount++; else vCount = 0;
                    document.getElementById('vloss').innerText = vCount;
                }
            };
        }
    </script>
</body>
              </html>
