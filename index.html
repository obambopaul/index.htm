<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Derivo Pro | All-In-One Guest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 2rem; }
        .green-glow { color: #10b981; text-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
        .red-glow { color: #ef4444; text-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-md mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-2">
                <div class="bg-emerald-500 p-2 rounded-xl shadow-lg shadow-emerald-500/20">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M22 7L13.5 15.5L8.5 10.5L2 17"></path><polyline points="16 7 22 7 22 13"></polyline></svg>
                </div>
                <h1 class="text-xl font-black uppercase tracking-tighter italic">Derivo<span class="text-emerald-500">.Pro</span></h1>
            </div>
            <span class="text-[10px] bg-slate-900 px-3 py-1 rounded-full text-slate-500 font-bold border border-slate-800 uppercase">London Pipe: 36542</span>
        </div>

        <!-- Balance Display -->
        <div class="glass p-8 mb-6 shadow-2xl relative overflow-hidden text-center border-t-2 border-emerald-500/30">
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-2">Live Account Balance</p>
            <div class="text-5xl font-black tracking-tighter text-emerald-400">$<span id="balance">0.00</span></div>
            <div id="status" class="mt-4 inline-block text-[9px] font-black uppercase text-red-500 bg-red-500/10 px-3 py-1 rounded-full border border-red-500/20">Offline</div>
        </div>

        <!-- Monitor Row -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="glass p-6 text-center border-b-4 border-emerald-500">
                <p class="text-[9px] text-slate-500 font-bold uppercase mb-2">London Pulse</p>
                <div id="digit" class="text-6xl font-black text-white">-</div>
            </div>
            <div class="glass p-6 text-center border-b-4 border-slate-700">
                <p class="text-[9px] text-slate-500 font-bold uppercase mb-2">Virtual Loss</p>
                <div class="flex justify-center items-baseline gap-1">
                    <span id="vloss" class="text-6xl font-black text-white">0</span>
                    <span class="text-slate-600 text-sm font-bold">/3</span>
                </div>
            </div>
        </div>

        <!-- Bot Selector -->
        <div class="grid grid-cols-3 gap-2 mb-6">
            <button onclick="setBot('seven')" id="b-seven" class="bg-emerald-500 text-white text-[10px] font-black p-3 rounded-xl border border-emerald-400">SEVEN</button>
            <button onclick="setBot('flash')" id="b-flash" class="bg-slate-800 text-slate-500 text-[10px] font-black p-3 rounded-xl border border-slate-700">FLASH</button>
            <button onclick="setBot('parity')" id="b-parity" class="bg-slate-800 text-slate-500 text-[10px] font-black p-3 rounded-xl border border-slate-700">PARITY</button>
        </div>

        <!-- Controls -->
        <div class="glass p-6 space-y-4">
            <input type="password" id="token" placeholder="Paste Deriv API Token" class="w-full bg-slate-950/50 border border-slate-800 rounded-2xl px-5 py-4 text-emerald-400 font-mono text-sm focus:outline-none focus:border-emerald-500 transition-all" />
            
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-slate-950/30 p-3 rounded-xl border border-slate-800">
                    <p class="text-[8px] font-bold text-slate-500 uppercase mb-1">Stake ($)</p>
                    <input type="number" id="stake" value="10" class="bg-transparent text-lg font-black text-white w-full outline-none" />
                </div>
                <div class="bg-slate-950/30 p-3 rounded-xl border border-slate-800">
                    <p class="text-[8px] font-bold text-slate-500 uppercase mb-1">V-Loss Limit</p>
                    <input type="number" id="vlimit" value="3" class="bg-transparent text-lg font-black text-white w-full outline-none" />
                </div>
            </div>

            <button id="main-btn" onclick="toggleEngine()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-5 rounded-3xl font-black text-lg shadow-xl shadow-emerald-500/20 active:scale-95 transition-all uppercase tracking-widest">
                Run Guest Engine
            </button>
        </div>

        <div id="logs" class="mt-6 bg-black/40 rounded-2xl p-4 h-24 overflow-y-auto font-mono text-[9px] text-slate-500 space-y-1">
            > System Online. Identity: Guest 36542<br>
            > Strategy: Seven Bot (8, 9)
        </div>
    </div>

    <script>
        let ws, isRunning = false, activeBot = 'seven', vCount = 0;
        let stake = 10, initialStake = 10;
        const GUEST_ID = "36542";

        function setBot(type) {
            activeBot = type;
            const bots = ['seven', 'flash', 'parity'];
            bots.forEach(b => {
                const el = document.getElementById(`b-${b}`);
                if(b === type) {
                    el.className = "bg-emerald-500 text-white text-[10px] font-black p-3 rounded-xl border border-emerald-400 shadow-lg shadow-emerald-500/20";
                } else {
                    el.className = "bg-slate-800 text-slate-500 text-[10px] font-black p-3 rounded-xl border border-slate-700";
                }
            });
            document.getElementById('logs').innerHTML = `> Switched to ${type.toUpperCase()} Strategy<br>` + document.getElementById('logs').innerHTML;
        }

        function toggleEngine() {
            const token = document.getElementById('token').value;
            if(!token) return alert("Please Paste Token");
            if(isRunning) { location.reload(); return; }

            initialStake = parseFloat(document.getElementById('stake').value);
            stake = initialStake;

            ws = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${GUEST_ID}`);
            
            ws.onopen = () => {
                ws.send(JSON.stringify({ authorize: token }));
            };

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.msg_type === 'authorize') {
                    document.getElementById('balance').innerText = data.authorize.balance;
                    document.getElementById('status').innerText = "Connected";
                    document.getElementById('status').className = "mt-4 inline-block text-[9px] font-black uppercase text-emerald-500 bg-emerald-500/10 px-3 py-1 rounded-full border border-emerald-500/20";
                    ws.send(JSON.stringify({ ticks: "R_100", subscribe: 1 }));
                    ws.send(JSON.stringify({ proposal_open_contract: 1, subscribe: 1 }));
                    isRunning = true;
                    document.getElementById('main-btn').innerText = "Stop Bot";
                    document.getElementById('main-btn').className = "w-full bg-red-600 text-white py-5 rounded-3xl font-black text-lg active:scale-95 transition-all uppercase tracking-widest";
                }

                if (data.tick) {
                    const d = parseInt(data.tick.quote.toString().slice(-1));
                    document.getElementById('digit').innerText = d;
                    
                    // ALL-IN-ONE STRATEGY LOGIC
                    let winOnPaper = false;
                    if (activeBot === 'seven') winOnPaper = (d > 7);
                    if (activeBot === 'flash') winOnPaper = (d === 5);
                    if (activeBot === 'parity') winOnPaper = (d % 2 === 0);

                    if (!winOnPaper) { vCount++; } else { vCount = 0; }
                    document.getElementById('vloss').innerText = vCount;

                    const limit = parseInt(document.getElementById('vlimit').value);
                    if (vCount >= limit) {
                        if (activeBot === 'seven' && d === 7) strike('DIGITOVER'
